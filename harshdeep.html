<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Moved – Manauna Dham</title>
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://www.crulio.com/ManaunaDham/hotels/">
  <meta http-equiv="refresh" content="7;url=https://www.crulio.com/ManaunaDham/hotels/">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #7a0000, #d4a017);
      font-family: Segoe UI, Arial, sans-serif;
      color: white;
    }
    .card {
      background: rgba(0, 0, 0, 0.5);
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      max-width: 600px;
      width: 90%;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.6);
    }
    h1 {
      margin-top: 0;
      font-size: 36px;
    }
    p {
      font-size: 18px;
    }
    a {
      color: white;
      text-decoration: none;
      background: #7a0000;
      padding: 12px 25px;
      border-radius: 8px;
      display: inline-block;
      margin-top: 15px;
      font-size: 18px;
      word-break: break-all;
    }
    a:hover {
      background: #a00000;
    }
    .progress-wrap {
      background: rgba(255,255,255,0.2);
      border-radius: 30px;
      height: 6px;
      margin-top: 24px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 100%;
      background: white;
      border-radius: 30px;
      transform-origin: left;
      animation: drain 7s linear forwards;
    }
    @keyframes drain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }
  </style>
  <script>
    var target = "https://www.crulio.com/ManaunaDham/hotels/";
    var seconds = 7;
    setTimeout(function () {
      window.location.replace(target);
    }, 7000);
    window.onload = function () {
      var el = document.getElementById("count");
      var timer = setInterval(function () {
        seconds--;
        if (seconds >= 0) el.innerText = seconds;
        else clearInterval(timer);
      }, 1000);
    };
  </script>
</head>
<body>
  <div class="card">
    <h1>🙏 Jai Shree Shyam 🙏</h1>
    <p>This page has moved. The new address is:</p>
    <a href="https://www.crulio.com/ManaunaDham/hotels/">https://www.crulio.com/ManaunaDham/hotels/</a>
    <p style="margin-top:24px;">You will be redirected in <b><span id="count">7</span></b> seconds…</p>
    <p>If it does not happen automatically, click the button above.</p>
    <div class="progress-wrap"><div class="progress-bar"></div></div>
  </div>
</body>
</html>
